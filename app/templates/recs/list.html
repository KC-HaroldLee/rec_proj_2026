{% extends "base.html" %}

{% block title %}권고 목록 - 사참위 권고 이행 모니터링{% endblock %}

{% block content %}
<div class="section-title"><h2>권고 목록</h2></div>

<div class="filters">
  <a class="filter-chip{% if selected_category == 'all' %} active{% endif %}" href="/recs?category=all">전체</a>
  {% for c in categories %}
  <a class="filter-chip{% if selected_category == c %} active{% endif %}" href="/recs?category={{ c | urlencode }}">{{ c }}</a>
  {% endfor %}
</div>

<div class="table">
  <div class="row head" style="grid-template-columns: 70px 1fr;">
    <div>번호</div>
    <div>권고 내용</div>
  </div>
  {% for rec in recs %}
  <div class="row" style="grid-template-columns: 70px 1fr;">
    <div class="no">{{ rec.rec_no }}</div>
    <div class="content"><a href="/recs/{{ rec.rec_id }}" class="clamp-2">{{ rec.content }}</a></div>
  </div>
  {% else %}
  <div class="empty">해당하는 권고가 없습니다.</div>
  {% endfor %}
</div>
{% endblock %}
