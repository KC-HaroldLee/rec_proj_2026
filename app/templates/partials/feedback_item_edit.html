<div class="feed-item" id="feedback-{{ f.feedback_id }}">
  <div class="feed-avatar">{{ f.auth_name[:1] }}</div>
  <div class="feed-body" style="flex: 1;">
    <form hx-post="/feedback/{{ f.feedback_id }}{% if ctx %}?ctx={{ ctx }}{% endif %}"
      hx-target="#feedback-{{ f.feedback_id }}" hx-swap="outerHTML"
      style="display: flex; flex-direction: column; gap: 8px;">
      <input type="text" name="content" value="{{ f.content }}" required>
      <input type="text" name="evidence_url" value="{{ f.evidence_url or '' }}" placeholder="근거 링크 (선택)">
      <div style="display: flex; gap: 8px;">
        <button class="btn" type="submit" style="width: auto; padding: 8px 18px; margin-top: 0;">저장</button>
        <button class="filter-chip" type="button"
          hx-get="/feedback/{{ f.feedback_id }}{% if ctx %}?ctx={{ ctx }}{% endif %}"
          hx-target="#feedback-{{ f.feedback_id }}" hx-swap="outerHTML">취소</button>
      </div>
    </form>
  </div>
</div>
